services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deer-flow-backend
    # Remove the ports section to not expose to host
    env_file:
      - .env
    volumes:
      - ./conf.yaml:/app/conf.yaml:ro
    restart: unless-stopped
    depends_on:
      - ragflow
    networks:
      - deer-flow-network

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
    container_name: deer-flow-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - deer-flow-network

  # RAGFlow Services
  ragflow:
    image: infiniflow/ragflow:latest
    container_name: ragflow
    ports:
      - "9388:9380"
    environment:
      - MYSQL_PASSWORD=infiniflow
      - ELASTICSEARCH_PASSWORD=infiniflow
    volumes:
      - ragflow_data:/ragflow
      - ./ragflow_logs:/ragflow/logs
    depends_on:
      - ragflow-mysql
      - ragflow-elasticsearch
    restart: unless-stopped
    networks:
      - deer-flow-network

  ragflow-mysql:
    image: mysql:8.0
    container_name: ragflow-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=infiniflow
      - MYSQL_DATABASE=ragflow
      - MYSQL_USER=ragflow
      - MYSQL_PASSWORD=infiniflow
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - deer-flow-network

  ragflow-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ragflow-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - deer-flow-network

volumes:
  ragflow_data:
  mysql_data:
  es_data:

networks:
  deer-flow-network:
    driver: bridge
